name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      - name: Test with pytest
        run: pytest tests/ -v --tb=short --cov=auto_launcher.py --cov=geogebra_mcp_server.py --cov-report=term

  node-tests:
    name: Node.js protocol tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Run protocol tests
        run: node tests/test_daemon_protocol.js

  build-check:
    name: Build check (wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          python -m pip install build
          python -m build --wheel
      - name: Verify wheel contents
        run: |
          python -c "
          import zipfile, sys
          wheel = __import__('glob').glob('dist/*.whl')[0]
          names = zipfile.ZipFile(wheel).namelist()
          print('\n'.join(names))
          assert any(n.endswith('geogebra_mcp/geogebra_daemon.js') for n in names), 'Missing geogebra_daemon.js'
          assert any(n.endswith('geogebra_mcp/geogebra_bridge.js') for n in names), 'Missing geogebra_bridge.js'
          assert any(n.endswith('geogebra_mcp/package.json') for n in names), 'Missing package.json'
          assert any(n.endswith('geogebra_mcp/server.py') for n in names), 'Missing server.py'
          print('OK: Wheel contains required files')
          "
